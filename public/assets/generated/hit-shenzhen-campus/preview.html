<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HIT Shenzhen Campus PPT Assets Preview</title>
    <style>
      :root {
        color: #15323f;
        font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        background: #f2f6f8;
      }
      body {
        margin: 0;
        padding: 40px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0;
      }
      p {
        margin: 0 0 28px;
        color: #4c6470;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
        gap: 24px;
      }
      figure {
        margin: 0;
        background: white;
        border: 1px solid rgba(0, 83, 117, 0.14);
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 18px 42px rgba(0, 42, 61, 0.08);
      }
      figure.bg img {
        aspect-ratio: 16 / 9;
      }
      figure.element img {
        aspect-ratio: 16 / 9;
        object-fit: contain;
        background: linear-gradient(135deg, #eef6f9, #ffffff);
      }
      img {
        display: block;
        width: 100%;
      }
      figcaption {
        padding: 12px 14px 14px;
        font-size: 14px;
        color: #2f4d5a;
      }
      code {
        color: #005375;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <h1>HIT Shenzhen Campus PPT Assets</h1>
    <p>Photo-derived backgrounds and reusable elements generated for the HTML slide templates.</p>
    <main class="grid">
      <figure class="bg">
        <img src="./bg-academic-day.svg" alt="Academic day background" />
        <figcaption><code>bg-academic-day.svg</code></figcaption>
      </figure>
      <figure class="bg">
        <img src="./bg-campus-aerial-clean.svg" alt="Clean aerial campus background" />
        <figcaption><code>bg-campus-aerial-clean.svg</code></figcaption>
      </figure>
      <figure class="bg">
        <img src="./bg-course-illustration-light.svg" alt="Course illustration background" />
        <figcaption><code>bg-course-illustration-light.svg</code></figcaption>
      </figure>
      <figure class="bg">
        <img src="./bg-data-deep-blue.svg" alt="Deep blue data background" />
        <figcaption><code>bg-data-deep-blue.svg</code></figcaption>
      </figure>
      <figure class="bg">
        <img src="./bg-campaign-sunset.svg" alt="Campaign sunset background" />
        <figcaption><code>bg-campaign-sunset.svg</code></figcaption>
      </figure>
      <figure class="bg">
        <img src="./bg-motto-stone-light.svg" alt="Motto stone light background" />
        <figcaption><code>bg-motto-stone-light.svg</code></figcaption>
      </figure>
      <figure class="element">
        <img src="./element-photo-strip.svg" alt="Campus photo strip element" />
        <figcaption><code>element-photo-strip.svg</code></figcaption>
      </figure>
      <figure class="element">
        <img src="./element-campus-window.svg" alt="Campus window element" />
        <figcaption><code>element-campus-window.svg</code></figcaption>
      </figure>
      <figure class="element">
        <img src="./element-motto-stone-card.svg" alt="Motto stone card element" />
        <figcaption><code>element-motto-stone-card.svg</code></figcaption>
      </figure>
      <figure class="element">
        <img src="./element-sunset-banner.svg" alt="Sunset campus banner element" />
        <figcaption><code>element-sunset-banner.svg</code></figcaption>
      </figure>
    </main>
  </body>
</html>
